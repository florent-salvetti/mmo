<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MMO</title>
    <!-- Polices du design : Cinzel (titres), Rajdhani (UI), JetBrains Mono (chiffres) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/client/hud.css">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #0a0f1f;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
      }
      /* Conteneur relatif qui englobe canvas + overlay HUD */
      .canvas-wrapper {
        position: relative;
        width:    100vw;
        height:   100vh;
      }
      canvas {
        display: block;
        width:   100%;
        height:  100%;
      }
    </style>
  </head>
  <body>
    <div class="canvas-wrapper">
      <canvas id="game-canvas" width="800" height="600"></canvas>

      <!-- ══════════════════════════════════════════════════════════
           HUD — Barre de sorts (bande basse y = 460 → 600)
           pointer-events: none sur le wrapper, auto sur .hud-inner
           ══════════════════════════════════════════════════════════ -->
      <div class="hud-spellbar" aria-label="Barre de sorts">
        <div class="hud-inner">

          <!-- PA et PM -->
          <div class="hud-resources">
            <div class="hud-res">
              <span class="hud-res-label">PA</span>
              <span class="hud-res-val ap">6</span>
              <div class="hud-res-bar"><div class="hud-res-bar-fill ap"></div></div>
            </div>
            <div class="hud-res">
              <span class="hud-res-label">PM</span>
              <span class="hud-res-val mp">3</span>
              <div class="hud-res-bar"><div class="hud-res-bar-fill mp"></div></div>
            </div>
          </div>

          <div class="hud-vsep"></div>

          <!-- Sorts -->
          <div class="hud-spells">

            <!-- Coup d'épée : 3 PA, portée 1 -->
            <button class="hud-spell" data-spell-id="coup-epee" title="Coup d'épée — 3 PA">
              <span class="hs-key">A</span>
              <span class="hs-cost">3</span>
              <span class="hs-icon">⚔️</span>
              <span class="hs-name">Coup d'épée</span>
              <div class="hs-cd hidden">0</div>
            </button>

            <!-- Tir à l'arc : 4 PA, portée 2-5 -->
            <button class="hud-spell" data-spell-id="tir-arc" title="Tir à l'arc — 4 PA">
              <span class="hs-key">Z</span>
              <span class="hs-cost">4</span>
              <span class="hs-icon">🏹</span>
              <span class="hs-name">Tir à l'arc</span>
              <div class="hs-cd hidden">0</div>
            </button>

            <!-- Charge : 2 PA, portée 1-3 -->
            <button class="hud-spell" data-spell-id="charge" title="Charge — 2 PA">
              <span class="hs-key">E</span>
              <span class="hs-cost">2</span>
              <span class="hs-icon">💨</span>
              <span class="hs-name">Charge</span>
              <div class="hs-cd hidden">0</div>
            </button>

          </div>

          <div class="hud-vsep"></div>

          <!-- Fin de tour -->
          <button class="hud-end-turn" title="Terminer le tour">
            <span class="hud-end-turn-label">Fin de tour</span>
            <span class="hud-end-turn-key">F</span>
          </button>

        </div><!-- /.hud-inner -->
        <div class="hud-hint" aria-live="polite">Clic case bleue = déplacer</div>
      </div><!-- /.hud-spellbar -->

    </div><!-- /.canvas-wrapper -->

    <script type="module" src="/src/client/main.ts"></script>
  </body>
</html>
