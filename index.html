<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MMO — Combat Tactique</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/client/hud.css">
  </head>
  <body>
    <div class="combat-app">

      <!-- ═══════════════════════════════════════════════════════════
           TOP BAR : numéro de tour · timer · acteur actif · file
           ═══════════════════════════════════════════════════════════ -->
      <div class="topbar">
        <div class="timeline">

          <!-- Compteur de tour -->
          <div class="turn-progress mono">Tour<strong class="turn-numval">01</strong></div>

          <!-- Anneau compte-à-rebours -->
          <div class="turn-timer">
            <svg class="timer-ring" viewBox="0 0 36 36" width="36" height="36" aria-hidden="true">
              <circle cx="18" cy="18" r="15" class="timer-track"/>
              <circle cx="18" cy="18" r="15" class="timer-fill" style="stroke-dasharray:94.25 94.25"/>
            </svg>
            <span class="timer-value mono">30</span>
          </div>

          <!-- Carte de l'acteur courant -->
          <div class="active-actor is-player">
            <div class="aa-hex"><span class="aa-glyph">K</span></div>
            <div class="aa-info">
              <div class="aa-label">À VOUS DE JOUER</div>
              <div class="aa-name">Kirito</div>
              <div class="aa-hp">
                <div class="aa-hp-fill" style="width:100%"></div>
                <span class="aa-hp-text mono">100/100</span>
              </div>
            </div>
          </div>

          <div class="timeline-arrow">→</div>

          <!-- File d'initiative (tokens à venir) -->
          <div class="timeline-track" aria-label="Ordre d'initiative"></div>

        </div>
      </div>

      <!-- ═══════════════════════════════════════════════════════════
           SCÈNE : panneaux latéraux + arène canvas centrale
           ═══════════════════════════════════════════════════════════ -->
      <div class="stage">

        <!-- Onglets flottants pour mobile -->
        <button class="mobile-tab left-tab" aria-label="Équipe">
          <span class="tab-glyph">⚔</span>
          <span class="tab-label">Équipe</span>
        </button>
        <button class="mobile-tab right-tab" aria-label="Ennemis">
          <span class="tab-glyph">✦</span>
          <span class="tab-label">Ennemis</span>
        </button>
        <div class="mobile-backdrop"></div>

        <!-- Panneau gauche : joueur + journal de combat -->
        <div class="side-panel left">
          <div class="portraits-allies"></div>
          <div class="combat-log">
            <div class="log-header">
              <span class="log-title">Journal de combat</span>
              <span class="log-title mono log-count" style="opacity:.5">0</span>
            </div>
            <div class="log-entries"></div>
          </div>
        </div>

        <!-- Zone centrale : canvas isométrique -->
        <div class="arena-wrap">
          <canvas id="game-canvas"></canvas>
        </div>

        <!-- Panneau droit : ennemis -->
        <div class="side-panel right">
          <div class="portraits-enemies"></div>
        </div>

      </div>

      <!-- ═══════════════════════════════════════════════════════════
           BARRE DE SORTS (bande basse)
           ═══════════════════════════════════════════════════════════ -->
      <div class="spellbar-wrap">
        <div class="spellbar">

          <!-- PA -->
          <div class="pa-indicator">
            <span class="v ap mono">6</span>
            <span class="l">PA</span>
          </div>
          <!-- PM -->
          <div class="pa-indicator">
            <span class="v mp mono">3</span>
            <span class="l">PM</span>
          </div>

          <!-- Coup d'épée -->
          <button class="spell" data-spell-id="coup-epee" title="Coup d'épée — 3 PA">
            <span class="spell-icon">⚔️</span>
            <span class="spell-cost mono">3</span>
            <div class="hs-cd hidden">0</div>
            <div class="spell-tooltip">
              <div class="spell-tt-name">Coup d'épée</div>
              <div class="spell-tt-meta">
                <span>PA <b>3</b></span><span>Portée <b>1</b></span><span><b>Physique</b></span>
              </div>
              <div class="spell-tt-desc">Frappe rapide au corps-à-corps. Inflige des dégâts physiques.</div>
            </div>
          </button>

          <!-- Tir à l'arc -->
          <button class="spell" data-spell-id="tir-arc" title="Tir à l'arc — 4 PA">
            <span class="spell-icon">🏹</span>
            <span class="spell-cost mono">4</span>
            <div class="hs-cd hidden">0</div>
            <div class="spell-tooltip">
              <div class="spell-tt-name">Tir à l'arc</div>
              <div class="spell-tt-meta">
                <span>PA <b>4</b></span><span>Portée <b>2–5</b></span><span><b>Tir</b></span>
              </div>
              <div class="spell-tt-desc">Tir à distance. Requiert une ligne de vue dégagée.</div>
            </div>
          </button>

          <!-- Charge -->
          <button class="spell" data-spell-id="charge" title="Charge — 2 PA">
            <span class="spell-icon">💨</span>
            <span class="spell-cost mono">2</span>
            <div class="hs-cd hidden">0</div>
            <div class="spell-tooltip">
              <div class="spell-tt-name">Charge</div>
              <div class="spell-tt-meta">
                <span>PA <b>2</b></span><span>Portée <b>1–3</b></span><span><b>Physique</b></span>
              </div>
              <div class="spell-tt-desc">Fonce en ligne droite vers l'ennemi et inflige des dégâts d'impact.</div>
            </div>
          </button>

          <!-- Salve de flèches -->
          <button class="spell" data-spell-id="salve-fleches" title="Salve de flèches — ? PA">
            <span class="spell-icon">🪃</span>
            <span class="spell-cost mono">?</span>
            <div class="hs-cd hidden">0</div>
            <div class="spell-tooltip">
              <div class="spell-tt-name">Salve de flèches</div>
              <div class="spell-tt-meta">
                <span>PA <b>?</b></span><span>Portée <b>?</b></span><span><b>Tir</b></span>
              </div>
              <div class="spell-tt-desc">Libère une rafale de projectiles sur une zone. (À venir)</div>
            </div>
          </button>

          <!-- Frappe renversante -->
          <button class="spell" data-spell-id="frappe-renversante" title="Frappe renversante — ? PA">
            <span class="spell-icon">🌀</span>
            <span class="spell-cost mono">?</span>
            <div class="hs-cd hidden">0</div>
            <div class="spell-tooltip">
              <div class="spell-tt-name">Frappe renversante</div>
              <div class="spell-tt-meta">
                <span>PA <b>?</b></span><span>Portée <b>1</b></span><span><b>Physique</b></span>
              </div>
              <div class="spell-tt-desc">Coup tourbillonnant qui repousse l'ennemi. (À venir)</div>
            </div>
          </button>

          <!-- Fin de tour -->
          <button class="end-turn-btn">
            <span>Fin de tour</span>
          </button>

          <!-- Abandonner -->
          <button class="abandon-btn" id="abandon-btn" title="Abandonner le combat">
            <span>Abandonner</span>
          </button>

        </div><!-- /.spellbar -->
      </div><!-- /.spellbar-wrap -->

      <!-- ═══════════════════════════════════════════════════════════
           CONFIRMATION D'ABANDON
           ═══════════════════════════════════════════════════════════ -->
      <div class="abandon-modal" id="abandon-modal">
        <div class="abandon-panel">
          <div class="abandon-title">Abandonner le combat ?</div>
          <div class="abandon-desc">Le groupe de monstres restera sur la carte.</div>
          <div class="abandon-actions">
            <button class="abandon-confirm-btn" id="abandon-confirm-btn">Fuir</button>
            <button class="abandon-cancel-btn"  id="abandon-cancel-btn">Continuer</button>
          </div>
        </div>
      </div>

      <!-- ═══════════════════════════════════════════════════════════
           BULLE DE CONFIRMATION DE COMBAT
           ═══════════════════════════════════════════════════════════ -->
      <div class="group-popup" id="group-popup">
        <div class="gpop-btns">
          <button class="gpop-btn gpop-confirm" id="gpop-confirm" title="Lancer le combat">✓</button>
          <button class="gpop-btn gpop-cancel"  id="gpop-cancel"  title="Annuler">✕</button>
        </div>
      </div>

      <!-- ═══════════════════════════════════════════════════════════
           RÉSUMÉ DE COMBAT (victoire / défaite)
           ═══════════════════════════════════════════════════════════ -->
      <div class="combat-summary" id="combat-summary">
        <div class="summary-panel">
          <div class="summary-title" id="summary-title"></div>
          <hr class="summary-divider">
          <div class="summary-stats" id="summary-stats"></div>
          <div class="summary-rewards" id="summary-rewards"></div>
          <button class="summary-continue-btn" id="summary-continue-btn">
            Retour en exploration
          </button>
        </div>
      </div>

    </div><!-- /.combat-app -->

    <script type="module" src="/src/client/main.ts"></script>
  </body>
</html>
